name: Build Application (0424 Branch) # 1. 重命名为0424分支

on:
  push:
    branches: [ "0424" ] # 2. 监听分支改为0424
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.10 

      - name: Install dependencies
        run: uv sync # 【关键】这里会自动安装PySide6，前提是你项目配置了依赖

      - name: Generate resources
        run: uv run python tools/make_resources.py # 【需适配】QML资源文件需要改这个脚本

      - name: Build executable
        run: uv run python build.py build

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iaa-windows-build-0424 # 3. 制品名改为0424
          path: dist_app/ # 输出路径不变，无需修改
