name: Draft Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-draft-release:
    runs-on: windows-latest

    steps:
      - name: Check out repository (0415 分支)
        uses: actions/checkout@v4
        with:
          ref: 0415          # 这里修复为正确分支名 0415
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install uv
        run: python -m pip install uv

      - name: Install dependencies
        run: uv sync --group dev

      - name: Prepare release metadata (从 0415 分支生成)
        id: meta
        shell: pwsh
        run: |
          echo "tag=0415-build" >> $env:GITHUB_OUTPUT
          echo "version=0415" >> $env:GITHUB_OUTPUT
          echo "body_path=$env:RUNNER_TEMP\release-body.md" >> $env:GITHUB_OUTPUT

      - name: Ensure release does not already exist
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $PSNativeCommandUseErrorActionPreference = $false
          gh release view "0415-build" --repo "${{ github.repository }}" 1> $null 2> "$env:RUNNER_TEMP\gh-release-view.err"
          $exitCode = $LASTEXITCODE
          if ($exitCode -eq 0) {
            throw "Release 0415-build already exists."
          }
          if ($exitCode -ne 1) {
            Get-Content "$env:RUNNER_TEMP\gh-release-view.err"
            throw "Failed to query release state."
          }
          $global:LASTEXITCODE = 0

      - name: Build release bundle
        run: uv run build.py build

      - name: Locate build artifact
        id: asset
        shell: pwsh
        run: |
          uv run python tools/release_draft.py find-asset --version "0415"

      - name: Create draft release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "0415-build" "${{ steps.asset.outputs.asset_path }}" `
            --repo "${{ github.repository }}" `
            --draft `
            --title "0415 分支自动构建" `
            --notes "基于 0415 分支自动生成发布版本"
